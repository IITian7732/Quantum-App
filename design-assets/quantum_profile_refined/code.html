<script>
        // Simple micro-interaction for the PIN toggle
        function togglePIN() {
            const toggle = document.querySelector('[onclick="this.classList.toggle(\'bg-primary\')"]');
            const handle = toggle.querySelector('div');
            const isActive = toggle.classList.contains('bg-primary');
            
            if (isActive) {
                handle.style.transform = 'translateX(24px)';
            } else {
                handle.style.transform = 'translateX(0)';
            }
        }

        // Initialize smooth transitions for glass effects on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
    </script>
