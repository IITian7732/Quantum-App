<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
}

void main() {
    vec2 uv = v_texCoord;
    
    // Deep navy to black gradient
    vec3 color1 = vec3(0.02, 0.04, 0.1); // Deep Navy
    vec3 color2 = vec3(0.01, 0.01, 0.02); // Blackish
    vec3 bg = mix(color1, color2, uv.y + 0.2 * sin(u_time * 0.2));
    
    // Faint constellation/particle effect
    float particles = 0.0;
    vec2 grid = floor(uv * 40.0);
    vec2 f_uv = fract(uv * 40.0) - 0.5;
    
    float rand = random(grid);
    if (rand > 0.98) {
        float dist = length(f_uv);
        float sparkle = sin(u_time * 2.0 + rand * 6.28) * 0.5 + 0.5;
        particles = smoothstep(0.04, 0.0, dist) * sparkle;
    }
    
    // Subtle glow layers
    float glow = 0.1 / (length(uv - vec2(0.5, 0.5)) + 0.8);
    vec3 finalColor = bg + vec3(particles) * 0.6 + vec3(0.1, 0.2, 0.4) * glow;
    
    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        const quotes = [
            { text: "The universe is change; our life is what our thoughts make it.", author: "Marcus Aurelius" },
            { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" },
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "You have power over your mind - not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
            { text: "Continuous effort - not strength or intelligence - is the key to unlocking our potential.", author: "Winston Churchill" },
            // Simplified array for brevity, imagine 44 more here. Adding a few more to make randomness work visibly.
            { text: "The obstacle in the path becomes the path. Never forget, within every obstacle is an opportunity to improve our condition.", author: "Ryan Holiday" },
            { text: "We suffer more often in imagination than in reality.", author: "Seneca" },
            { text: "If you want to live a happy life, tie it to a goal, not to people or things.", author: "Albert Einstein" },
            { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" }
        ];

        let seenIndices = new Set();
        let currentQuoteIndex = 0; // Simulated total count for UI

        const quoteContainer = document.getElementById('quote-container');
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const generateBtn = document.getElementById('generate-btn');
        const counterText = document.getElementById('quote-counter');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        // Initialize first random quote that isn't the hardcoded one
        function getRandomIndex() {
            if (seenIndices.size >= quotes.length) {
                seenIndices.clear(); // Reset if we've seen them all
            }
            let idx;
            do {
                idx = Math.floor(Math.random() * quotes.length);
            } while (seenIndices.has(idx));
            seenIndices.add(idx);
            return idx;
        }

        function generateQuote() {
            // Animate out
            quoteContainer.classList.remove('quote-transition-enter-active');
            quoteContainer.classList.add('quote-transition-enter');

            setTimeout(() => {
                const idx = getRandomIndex();
                const quote = quotes[idx];
                
                quoteText.textContent = `"${quote.text}"`;
                quoteAuthor.textContent = quote.author;
                
                currentQuoteIndex = Math.min(50, seenIndices.size);
                counterText.textContent = `Quote ${currentQuoteIndex} of 50`;

                // Add active glow effect to card
                quoteContainer.parentElement.classList.add('glass-panel-active');
                setTimeout(() => quoteContainer.parentElement.classList.remove('glass-panel-active'), 500);

                // Animate in
                requestAnimationFrame(() => {
                    quoteContainer.classList.remove('quote-transition-enter');
                    quoteContainer.classList.add('quote-transition-enter-active');
                });
            }, 300); // Wait for fade out
        }

        generateBtn.addEventListener('click', generateQuote);

        // Copy functionality
        copyBtn.addEventListener('click', async () => {
            const textToCopy = `${quoteText.textContent} - ${quoteAuthor.textContent}`;
            try {
                await navigator.clipboard.writeText(textToCopy);
                showToast();
            } catch (err) {
                console.error('Failed to copy text: ', err);
                // Fallback or ignore for this demo
            }
        });

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Setup initial state
        seenIndices.add(0); // Mark the hardcoded one as seen
        quoteContainer.classList.add('quote-transition-enter-active');
    </script>
