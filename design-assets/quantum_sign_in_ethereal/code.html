<!DOCTYPE html>

<style>
        body {
            background-color: #F8F9FA;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 2px rgba(67, 82, 165, 0.2);
            border-color: #4352a5;
        }
        
        /* Hide scrollbar for PIN inputs */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-background min-h-screen font-body-md overflow-x-hidden antialiased bg-background relative selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl flex items-center justify-center w-full h-16 px-gutter transition-all duration-300 border-none shadow-sm">
<div class="flex items-center space-x-3">
<span class="material-symbols-outlined text-primary scale-105 duration-300" data-weight="fill">bolt</span>
<div class="flex flex-col items-start">
<h1 class="font-headline-md text-headline-md tracking-tighter text-primary leading-none">QUANTUM</h1>
<span class="font-label-sm text-[12px] text-on-surface-variant mt-1 uppercase tracking-widest">Unlock Your Potential</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex flex-col items-center justify-center min-h-screen px-margin-mobile md:px-margin-desktop pt-24 pb-32 relative z-10 w-full max-w-container-max mx-auto">
<!-- Central Soft White Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-[0_8px_32px_rgba(67,82,165,0.08)] border border-outline-variant p-8 relative overflow-hidden transition-all duration-500 hover:shadow-[0_12px_48px_rgba(67,82,165,0.12)]">
<div class="text-center mb-8">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize your session to continue</p>
</div>
<!-- Tabs for Authentication Method -->
<div class="flex p-1 bg-surface-container-high rounded-lg mb-8">
<button class="flex-1 py-2 text-sm font-semibold rounded-md bg-surface-container-lowest shadow-sm text-on-surface transition-colors" type="button">Password</button>
<button class="flex-1 py-2 text-sm font-semibold rounded-md text-on-surface-variant hover:text-on-surface transition-colors" type="button">PIN</button>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2 relative">
<label class="font-label-sm text-label-sm text-on-surface ml-1 block">Authentication ID (Email)</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-lg border border-outline-variant input-focus-ring transition-all duration-300 overflow-hidden">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">mail</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 text-on-surface placeholder-on-surface-variant/50 focus:ring-0 font-body-md text-body-md" placeholder="agent@quantum.network" required="" type="email"/>
</div>
</div>
<!-- Password Input (Active by default, PIN section could be toggled by JS) -->
<div class="space-y-2 relative" id="password-section">
<div class="flex justify-between items-center ml-1">
<label class="font-label-sm text-label-sm text-on-surface block">Security Key (Password)</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center bg-surface-container-lowest rounded-lg border border-outline-variant input-focus-ring transition-all duration-300 overflow-hidden">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">lock</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-12 text-on-surface placeholder-on-surface-variant/50 focus:ring-0 font-body-md text-body-md tracking-widest" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- PIN Input Section (Hidden by default, shown for demonstration of addition) -->
<div class="space-y-2 relative hidden" id="pin-section">
<div class="flex justify-between items-center ml-1 mb-2">
<label class="font-label-sm text-label-sm text-on-surface block">Enter 4-Digit PIN</label>
<a class="font-label-sm text-[12px] text-primary hover:text-primary-container transition-colors" href="#">Forgot PIN?</a>
</div>
<div class="flex justify-between gap-3">
<input class="w-14 h-16 text-center text-2xl font-semibold bg-surface-container-lowest rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 text-on-surface transition-all duration-300" maxlength="1" pattern="[0-9]" type="text"/>
<input class="w-14 h-16 text-center text-2xl font-semibold bg-surface-container-lowest rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 text-on-surface transition-all duration-300" maxlength="1" pattern="[0-9]" type="text"/>
<input class="w-14 h-16 text-center text-2xl font-semibold bg-surface-container-lowest rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 text-on-surface transition-all duration-300" maxlength="1" pattern="[0-9]" type="text"/>
<input class="w-14 h-16 text-center text-2xl font-semibold bg-surface-container-lowest rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 text-on-surface transition-all duration-300" maxlength="1" pattern="[0-9]" type="text"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 mt-8 rounded-full bg-gradient-to-r from-primary to-[#5b6bc0] font-headline-md text-[18px] text-on-primary flex items-center justify-center space-x-2 shadow-md hover:shadow-lg hover:opacity-95 active:scale-95 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-primary-container" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="mt-8 flex items-center justify-center space-x-4">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-[12px] text-on-surface-variant uppercase tracking-widest">Or continue with</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- Social Logins -->
<div class="mt-6 flex justify-center space-x-4">
<button class="w-14 h-14 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-variant text-on-surface transition-all duration-300 bg-surface-container-lowest shadow-sm active:scale-95 group">
<!-- Generic icon representing Google for this exercise -->
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">language</span>
</button>
<button class="w-14 h-14 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-variant text-on-surface transition-all duration-300 bg-surface-container-lowest shadow-sm active:scale-95 group">
<!-- Generic icon representing Apple for this exercise -->
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">devices</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center py-4 px-margin-mobile bg-surface-container-lowest/90 backdrop-blur-xl border-t border-outline-variant/30 shadow-[0_-4px_20px_rgba(67,82,165,0.05)] md:hidden">
<!-- Active: Sign In -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-weight="fill">login</span>
<span class="font-label-sm text-[12px]">Sign In</span>
</a>
<!-- Inactive: Sign Up -->
<a class="flex flex-col items-center justify-center text-outline hover:text-primary active:scale-95 transition-transform px-6 py-1 group" href="#">
<span class="material-symbols-outlined mb-1 text-[20px] group-hover:scale-110 transition-transform">person_add</span>
<span class="font-label-sm text-[12px]">Sign Up</span>
</a>
</nav>
<!-- Desktop Navigation Alternative -->
<nav class="hidden md:flex fixed top-0 right-0 h-16 items-center px-margin-desktop z-50 space-x-8">
<a class="font-label-sm text-[14px] text-primary flex items-center space-x-2 border-b-2 border-primary pb-1 font-semibold" href="#">
<span class="material-symbols-outlined text-[18px]">login</span>
<span>Sign In</span>
</a>
<a class="font-label-sm text-[14px] text-on-surface-variant hover:text-primary transition-colors flex items-center space-x-2 font-semibold" href="#">
<span class="material-symbols-outlined text-[18px]">person_add</span>
<span>Sign Up</span>
</a>
</nav>
<script>
    // Simple script to toggle between Password and PIN for demonstration
    document.addEventListener('DOMContentLoaded', () => {
        const tabs = document.querySelectorAll('.bg-surface-container-high button');
        const pwdSection = document.getElementById('password-section');
        const pinSection = document.getElementById('pin-section');

        if(tabs.length >= 2) {
            tabs[0].addEventListener('click', () => {
                tabs[0].className = 'flex-1 py-2 text-sm font-semibold rounded-md bg-surface-container-lowest shadow-sm text-on-surface transition-colors';
                tabs[1].className = 'flex-1 py-2 text-sm font-semibold rounded-md text-on-surface-variant hover:text-on-surface transition-colors';
                pwdSection.classList.remove('hidden');
                pinSection.classList.add('hidden');
            });
            tabs[1].addEventListener('click', () => {
                tabs[1].className = 'flex-1 py-2 text-sm font-semibold rounded-md bg-surface-container-lowest shadow-sm text-on-surface transition-colors';
                tabs[0].className = 'flex-1 py-2 text-sm font-semibold rounded-md text-on-surface-variant hover:text-on-surface transition-colors';
                pinSection.classList.remove('hidden');
                pwdSection.classList.add('hidden');
            });
        }
    });
</script>
</body></html>
