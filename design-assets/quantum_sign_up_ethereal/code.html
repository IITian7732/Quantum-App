<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
    body {
      min-height: max(884px, 100dvh);
    }
    
    /* Hide scrollbar for clean look */
    ::-webkit-scrollbar {
        width: 0px;

<body class="antialiased min-h-screen flex flex-col items-center justify-center relative font-sora text-ethereal-text pb-24 md:pb-0 bg-ethereal-bg">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-transparent flex items-center justify-center w-full h-16 px-gutter z-50">
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-brand-primary scale-105 duration-300">blur_on</span>
<span class="font-headline-md text-headline-md tracking-tighter text-brand-primary">QUANTUM</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md px-margin-mobile md:px-0 pt-20 pb-8 flex-grow flex flex-col justify-center relative z-10">
<!-- Registration Card -->
<div class="bg-white rounded-[2rem] shadow-[0_8px_32px_rgba(67,82,165,0.08)] border border-gray-100 w-full p-8 md:p-10">
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-ethereal-text mb-2">Start Your Journey</h1>
<p class="font-body-md text-body-md text-ethereal-text-variant font-sora">Access the next generation of productivity.</p>
</div>
<form class="space-y-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-ethereal-text-variant uppercase block font-sora" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">person</span>
<input class="w-full h-12 rounded-lg pl-12 pr-4 text-ethereal-text bg-gray-50 border border-gray-200 placeholder:text-gray-400 font-body-md text-body-md focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none transition-colors" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-ethereal-text-variant uppercase block font-sora" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
<input class="w-full h-12 rounded-lg pl-12 pr-4 text-ethereal-text bg-gray-50 border border-gray-200 placeholder:text-gray-400 font-body-md text-body-md focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none transition-colors" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-ethereal-text-variant uppercase block font-sora" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
<input class="w-full h-12 rounded-lg pl-12 pr-4 text-ethereal-text bg-gray-50 border border-gray-200 placeholder:text-gray-400 font-body-md text-body-md focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-ethereal-text transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-center space-x-3 mt-4">
<input class="w-5 h-5 rounded border-gray-300 text-brand-primary focus:ring-brand-primary flex-shrink-0 cursor-pointer" id="terms" type="checkbox"/>
<label class="font-body-md text-[14px] text-ethereal-text-variant select-none font-sora" for="terms">
                        I agree to the <a class="text-brand-primary hover:text-opacity-80 transition-colors underline underline-offset-2" href="#">Terms of Service</a> and <a class="text-brand-primary hover:text-opacity-80 transition-colors underline underline-offset-2" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full h-14 rounded-full font-headline-md text-[16px] text-white flex items-center justify-center space-x-2 mt-8 bg-brand-primary hover:bg-opacity-90 shadow-md hover:shadow-lg transition-all" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-px bg-gray-200"></div>
<span class="px-4 font-label-sm text-label-sm text-gray-400 uppercase font-sora">Or continue with</span>
<div class="flex-grow h-px bg-gray-200"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="h-12 rounded-lg flex items-center justify-center space-x-2 border border-gray-200 bg-white hover:bg-gray-50 transition-colors" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-md text-[14px] text-ethereal-text font-sora">Google</span>
</button>
<button class="h-12 rounded-lg flex items-center justify-center space-x-2 border border-gray-200 bg-white hover:bg-gray-50 transition-colors" type="button">
<svg class="w-5 h-5 text-ethereal-text" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.8-3.08 1.8-1.09 0-1.44-.65-2.67-.65-1.25 0-1.64.65-2.7.65-1.05 0-2.03-.84-2.96-1.74-2.27-2.18-4.08-5.91-4.08-9.04 0-3.9 2.5-5.96 5.09-5.96 1.25 0 2.4.82 3.12.82.72 0 2.12-.95 3.59-.95 1.5 0 2.83.6 3.65 1.53-2.9 1.66-2.45 5.56.5 6.75-.72 2.01-1.72 4.14-3.46 5.79zm-2.88-16.14c.5-1.25.75-2.58.75-3.9 0-.21-.03-.43-.07-.64-1.27.05-2.74.8-3.66 1.76-.75.78-1.29 2.06-1.29 3.32 0 .25.04.5.07.7 1.34-.1 2.76-.87 3.54-1.89z"></path>
</svg>
<span class="font-body-md text-[14px] text-ethereal-text font-sora">Apple</span>
</button>
</div>
<!-- Mobile login link fallback -->
<div class="mt-8 text-center md:hidden">
<span class="font-body-md text-[14px] text-ethereal-text-variant font-sora">Already have an account? </span>
<a class="font-body-md text-[14px] text-brand-primary hover:text-opacity-80 transition-colors font-sora" href="#">Sign In</a>
</div>
</div>
</main>
</body></html>
