        body {

        .ethereal-bg {

                radial-gradient(circle at 50% 80%, rgba(255, 245, 230, 0.6), transparent 50%);

        @keyframes pulse-bg {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }

        .blob-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: auto;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;

        .blob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            z-index: 0;
            opacity: 0.7;
            filter: drop-shadow(0 20px 40px rgba(200, 180, 220, 0.2));
            animation: morph 8s ease-in-out infinite;
            fill: url(#gradient);
        }

        @keyframes morph {
            0%, 100% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }
            50% {
                border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
            }
        }

            border-radius: 50px;
            box-shadow:

                inset 0 2px 5px rgba(255,255,255,0.8);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);

        .droplet-btn:hover {
            transform: translateY(-2px) scale(1.02);
            background: rgba(255, 255, 255, 0.6);

            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.1);

        .liquid-text {
            background: linear-gradient(to right, #7a6b9e, #5a8ba8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .quote-transition-enter {
            opacity: 0;
            filter: blur(10px);
            transform: translateY(20px);
        }
        
        .quote-transition-enter-active {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
            transition: opacity 800ms ease, filter 800ms ease, transform 800ms ease;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;

<!-- Application Logic -->
<script>
        const quotes = [
            { text: "The universe is change; our life is what our thoughts make it.", author: "Marcus Aurelius" },
            { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" },
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "You have power over your mind - not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
            { text: "Continuous effort - not strength or intelligence - is the key to unlocking our potential.", author: "Winston Churchill" },
            { text: "The obstacle in the path becomes the path. Never forget, within every obstacle is an opportunity to improve our condition.", author: "Ryan Holiday" },
            { text: "We suffer more often in imagination than in reality.", author: "Seneca" },
            { text: "If you want to live a happy life, tie it to a goal, not to people or things.", author: "Albert Einstein" },
            { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" }
        ];

        let seenIndices = new Set();
        let currentQuoteIndex = 0; // Simulated total count for UI

        const quoteContainer = document.getElementById('quote-container');
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const generateBtn = document.getElementById('generate-btn');
        const counterText = document.getElementById('quote-counter');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        // SVG Path animation helper
        const blobPaths = [
            "M42.9,-73.4C55.4,-67.2,65.3,-55.1,73.1,-41.8C80.9,-28.5,86.6,-14.2,85.2,-0.8C83.8,12.6,75.3,25.2,66.1,36.5C56.9,47.8,47,57.8,34.8,64.8C22.6,71.8,8.1,75.8,-5.5,75.2C-19.1,74.6,-31.8,69.4,-43.3,61.8C-54.8,54.2,-65.1,44.2,-72.1,32.1C-79.1,20,-82.8,5.8,-81.4,-7.8C-80,-21.4,-73.5,-34.4,-64.3,-44.6C-55.1,-54.8,-43.2,-62.2,-31,-68.2C-18.8,-74.2,-6.3,-78.8,7.1,-82.8C20.5,-86.8,40.9,-90.1,42.9,-73.4Z",
            "M37.6,-66.4C49,-60.5,58.8,-50.2,67.6,-38.3C76.4,-26.4,84.2,-13.2,84.7,0.3C85.2,13.8,78.4,27.5,69.4,39.3C60.4,51.1,49.2,61,36.3,67.1C23.4,73.2,8.8,75.5,-5.5,74.2C-19.8,72.9,-33.8,68,-45.5,59.9C-57.2,51.8,-66.6,40.5,-72.9,27.5C-79.2,14.5,-82.4,-0.2,-79.8,-13.7C-77.2,-27.2,-68.8,-39.5,-57.8,-49C-46.8,-58.5,-33.2,-65.2,-19.9,-67.7C-6.6,-70.2,6.4,-68.5,19.1,-65C31.8,-61.5,44.2,-56.2,37.6,-66.4Z",
            "M47.5,-75.4C59.9,-67.9,67.3,-52.1,72.9,-36.4C78.5,-20.7,82.3,-5.1,80.1,9.6C77.9,24.3,69.7,38,58.5,48.6C47.3,59.2,33.1,66.7,17.9,71.2C2.7,75.7,-13.5,77.2,-27.5,72.2C-41.5,67.2,-53.3,55.7,-63.1,42.4C-72.9,29.1,-80.7,14.5,-82,-0.7C-83.3,-15.9,-78.1,-31.8,-68.3,-44.6C-58.5,-57.4,-44.1,-67.1,-29.4,-72.3C-14.7,-77.5,0.3,-78.2,15.7,-76.3C31.1,-74.4,46.9,-69.9,47.5,-75.4Z"
        ];
        const blobElement = document.querySelector('.blob path');

        // Initialize first random quote that isn't the hardcoded one
        function getRandomIndex() {
            if (seenIndices.size >= quotes.length) {
                seenIndices.clear(); // Reset if we've seen them all
            }
            let idx;
            do {
                idx = Math.floor(Math.random() * quotes.length);
            } while (seenIndices.has(idx));
            seenIndices.add(idx);
            return idx;
        }

        function generateQuote() {
            // Animate out
            quoteContainer.classList.remove('quote-transition-enter-active');
            quoteContainer.classList.add('quote-transition-enter');
            
            // Morph blob
            const randomPath = blobPaths[Math.floor(Math.random() * blobPaths.length)];
            blobElement.setAttribute('d', randomPath);
            blobElement.style.transition = "d 1s ease-in-out";

            setTimeout(() => {
                const idx = getRandomIndex();
                const quote = quotes[idx];
                
                quoteText.textContent = `"${quote.text}"`;
                quoteAuthor.textContent = quote.author;
                
                currentQuoteIndex = Math.min(50, seenIndices.size);
                counterText.textContent = `${currentQuoteIndex} / 50`;

                // Animate in
                requestAnimationFrame(() => {
                    quoteContainer.classList.remove('quote-transition-enter');
                    quoteContainer.classList.add('quote-transition-enter-active');
                });
            }, 600); // Wait for fade out
        }

        generateBtn.addEventListener('click', generateQuote);

        // Copy functionality
        copyBtn.addEventListener('click', async () => {
            const textToCopy = `${quoteText.textContent} - ${quoteAuthor.textContent}`;
            try {
                await navigator.clipboard.writeText(textToCopy);
                showToast();
            } catch (err) {
                console.error('Failed to copy text: ', err);
                // Fallback or ignore for this demo
            }
        });

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Setup initial state
        seenIndices.add(0); // Mark the hardcoded one as seen
        quoteContainer.classList.add('quote-transition-enter-active');
    </script>
