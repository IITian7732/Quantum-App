<body class="text-on-background min-h-screen font-body-md overflow-x-hidden antialiased bg-mesh-glow relative">
<!-- Intent implies transactional (Login), but instructions demand rendering the exact component from JSON. 
         Following "The Destination Rule: Automatic Suppression" - typically transactional screens hide nav.
         HOWEVER, the BottomNavBar JSON explicitly contains "Sign In" and "Sign Up", meaning THIS design 
         treats Sign In as a destination with a specific shell. I will follow the explicit prompt instructions to include them. -->
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-transparent flex items-center justify-center w-full h-16 px-gutter transition-all duration-300">
<div class="flex items-center space-x-3">
<span class="material-symbols-outlined text-primary scale-105 duration-300" style="font-variation-settings: 'FILL' 1;">blur_on</span>
<div class="flex flex-col items-start">
<h1 class="font-headline-md text-headline-md tracking-tighter text-primary dark:text-primary leading-none">QUANTUM</h1>
<span class="font-label-sm text-label-sm text-secondary opacity-80 mt-1">Unlock Your Potential</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex flex-col items-center justify-center min-h-screen px-margin-mobile md:px-margin-desktop pt-24 pb-32 relative z-10">
<!-- Central Glassmorphism Card -->
<div class="w-full max-w-md glass-panel glow-border rounded-lg p-8 shadow-[0_0_40px_rgba(139,92,246,0.1)] relative overflow-hidden">
<!-- Light hit corner -->
<div class="absolute top-0 left-0 w-16 h-16 bg-gradient-to-br from-white/20 to-transparent opacity-30 pointer-events-none rounded-tl-lg"></div>
<div class="text-center mb-8">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-white mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize your session to continue</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2 relative">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1 block">Authentication ID (Email)</label>
<div class="relative flex items-center bg-surface-container-low/50 rounded-lg border border-white/10 input-glow transition-all duration-300 overflow-hidden backdrop-blur-md">
<span class="material-symbols-outlined absolute left-4 text-secondary opacity-70">mail</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 text-white placeholder-white/20 focus:ring-0 font-body-md text-body-md" placeholder="agent@quantum.network" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2 relative">
<div class="flex justify-between items-center ml-1">
<label class="font-label-sm text-label-sm text-on-surface-variant block">Security Key (Password)</label>
<a class="font-label-sm text-label-sm text-tertiary hover:text-tertiary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center bg-surface-container-low/50 rounded-lg border border-white/10 input-glow transition-all duration-300 overflow-hidden backdrop-blur-md">
<span class="material-symbols-outlined absolute left-4 text-secondary opacity-70">lock</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-12 text-white placeholder-white/20 focus:ring-0 font-body-md text-body-md tracking-widest" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-4 text-white/40 hover:text-white transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 mt-8 rounded-full btn-gradient font-headline-md text-[18px] text-white flex items-center justify-center space-x-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="mt-8 flex items-center justify-center space-x-4">
<div class="h-px bg-white/10 flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Or continue with</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<!-- Social Logins -->
<div class="mt-6 flex justify-center space-x-4">
<button class="w-14 h-14 rounded-full border border-white/10 flex items-center justify-center hover:border-secondary hover:text-tertiary transition-all duration-300 bg-surface-container-low/30 backdrop-blur-sm group">
<!-- Generic icon representing Google for this exercise -->
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">language</span>
</button>
<button class="w-14 h-14 rounded-full border border-white/10 flex items-center justify-center hover:border-secondary hover:text-tertiary transition-all duration-300 bg-surface-container-low/30 backdrop-blur-sm group">
<!-- Generic icon representing Apple for this exercise -->
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">devices</span>
</button>
</div>
</div>
</main>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center py-4 px-margin-mobile bg-surface-container/40 backdrop-blur-xl rounded-t-lg shadow-[0_0_20px_rgba(139,92,246,0.15)] md:hidden">
<!-- Active: Sign In -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">login</span>
<span class="font-label-sm text-label-sm">Sign In</span>
</a>
<!-- Inactive: Sign Up -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-secondary active:scale-95 transition-transform px-6 py-1" href="#">
<span class="material-symbols-outlined mb-1 text-[20px]">person_add</span>
<span class="font-label-sm text-label-sm">Sign Up</span>
</a>
</nav>
<!-- Desktop Navigation Alternative (Since BottomNav is md:hidden per standard practice, though prompt asked for BottomNav generally. I'll hide BottomNav on desktop to follow 'Platform & Layout' logic) -->
<nav class="hidden md:flex fixed top-0 right-0 h-16 items-center px-margin-desktop z-50 space-x-8">
<a class="font-label-sm text-label-sm text-primary flex items-center space-x-2 border-b-2 border-primary pb-1" href="#">
<span class="material-symbols-outlined text-[18px]">login</span>
<span>Sign In</span>
</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary transition-colors flex items-center space-x-2" href="#">
<span class="material-symbols-outlined text-[18px]">person_add</span>
<span>Sign Up</span>
</a>
</nav>
