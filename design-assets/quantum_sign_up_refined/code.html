<body class="antialiased min-h-screen flex flex-col items-center justify-center relative font-sora text-ethereal-text pb-24 md:pb-0 bg-ethereal-bg">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-transparent flex items-center justify-center w-full h-16 px-gutter z-50"><div class="flex items-center space-x-3"><div class="w-8 h-8 bg-brand-primary rounded-lg flex items-center justify-center"><span class="material-symbols-outlined text-white text-[20px]">blur_on</span></div><span class="font-sora font-bold text-[20px] tracking-tight text-ethereal-text">QUANTUM</span></div></header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md px-margin-mobile md:px-0 pt-20 pb-8 flex-grow flex flex-col justify-center relative z-10">
<!-- Registration Card -->
<div class="bg-white rounded-[2rem] shadow-lg border border-gray-100 w-full p-8 md:p-10">
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-ethereal-text mb-2">Start Your Journey</h1>
<p class="font-body-md text-body-md text-ethereal-text-variant font-sora">Access the next generation of productivity.</p>
</div>
<form class="space-y-6">
<!-- Profile Image Upload -->
<div class="flex flex-col items-center justify-center space-y-4 mb-6">
<div class="relative w-24 h-24 rounded-full overflow-hidden bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center group cursor-pointer hover:border-brand-primary transition-colors">
<img alt="Profile Preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAV7x_C1W4eCd9QphQchP0bFKIyu8wLgFOCejUWsTL9J-UmOTp08WfaRQA4osiix7trduu0wWUxr-ZvqUfaLOQhzGiWaRBT7PddJIaKX6XXxINGDkBHzlGec_JL66GhmeRP-YloQbI5qPuQr79-pADZdWviHeVQxFMLlL7R-2J790sP1OR2k7fv818pJSbfRYTsfkPm-ZiHVPTask-Z_nwmKqckemH-A7JQdJEyKTXvnQHAPNtBlunwP2yYQ1MqUGpSnLYgnpeg_Tkd"/>
<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
<span class="font-label-sm text-label-sm text-ethereal-text-variant uppercase font-sora">Upload Photo</span>
</div>
<!-- Name Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-ethereal-text-variant uppercase block font-sora" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">person</span>
<input class="w-full h-12 rounded-lg pl-12 pr-4 text-ethereal-text bg-white border border-gray-200 placeholder:text-gray-400 font-body-md text-body-md focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none transition-all" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-ethereal-text-variant uppercase block font-sora" for="email">Email ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
<input class="w-full h-12 rounded-lg pl-12 pr-4 text-ethereal-text bg-white border border-gray-200 placeholder:text-gray-400 font-body-md text-body-md focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none transition-all" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Phone Number Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-ethereal-text-variant uppercase block font-sora" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">call</span>
<input class="w-full h-12 rounded-lg pl-12 pr-4 text-ethereal-text bg-white border border-gray-200 placeholder:text-gray-400 font-body-md text-body-md focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none transition-all" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- PIN Number Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-ethereal-text-variant uppercase block font-sora" for="pin">PIN Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">pin</span>
<input class="w-full h-12 rounded-lg pl-12 pr-4 text-ethereal-text bg-white border border-gray-200 placeholder:text-gray-400 font-body-md text-body-md focus:border-brand-primary focus:ring-1 focus:ring-brand-primary outline-none transition-all" id="pin" maxlength="4" placeholder="••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-ethereal-text transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-center space-x-3 mt-4">
<input class="w-5 h-5 rounded border-gray-300 text-brand-primary focus:ring-brand-primary flex-shrink-0 cursor-pointer" id="terms" type="checkbox"/>
<label class="font-body-md text-[14px] text-ethereal-text-variant select-none font-sora" for="terms">
                        I agree to the <a class="text-brand-primary hover:text-opacity-80 transition-colors underline underline-offset-2" href="#">Terms of Service</a> and <a class="text-brand-primary hover:text-opacity-80 transition-colors underline underline-offset-2" href="#">Privacy Policy</a>
</label>
</div>

<button class="w-full h-14 bg-brand-primary text-white rounded-full font-sora font-semibold text-[16px] flex items-center justify-center space-x-2 mt-8 hover:bg-opacity-90 hover:shadow-lg transition-all" onclick="window.location.href='{{DATA:SCREEN:SCREEN_13}}'" type="submit">
<span class="">Create Account</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Mobile login link fallback -->
<div class="mt-8 text-center">
<span class="font-body-md text-[14px] text-ethereal-text-variant font-sora">Already have an account? </span>
<a class="font-body-md text-[14px] text-brand-primary hover:text-opacity-80 transition-colors font-sora" href="{{DATA:SCREEN:SCREEN_4}}">Sign In</a>
</div>
</div>
