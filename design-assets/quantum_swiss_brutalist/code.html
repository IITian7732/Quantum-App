<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Quantum - Success Quotes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&amp;display=swap" rel="stylesheet">
<style>
        body {
            background-color: #FFD500;
            color: #000000;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            min-height: max(884px, 100dvh);
        }

        .brutalist-shadow {
            box-shadow: 8px 8px 0px 0px #000000;
        }

        .brutalist-button {
            transition: all 0.1s ease;
        }
        
        .brutalist-button:active {
            transform: translate(8px, 8px);
            box-shadow: 0px 0px 0px 0px #000000;
        }

        .quote-transition-enter {
            opacity: 0;
            transform: translateX(-20px);
        }
        
        .quote-transition-enter-active {
            opacity: 1;
            transform: translateX(0);
            transition: all 0.2s ease-out;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            opacity: 0;
            transition: all 0.2s ease;
            box-shadow: 8px 8px 0px 0px #000000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Broken layout overlap */
        .overlap-text {
            position: absolute;
            left: -20px;
            top: -30px;
            z-index: 10;
            font-size: 120px;
            line-height: 0.8;
            color: #FF0000;
            mix-blend-mode: multiply;
            pointer-events: none;
            overflow: visible;
            white-space: nowrap;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden antialiased selection:bg-[#0000FF] selection:text-white">
<!-- Header -->
<header class="fixed top-0 w-full bg-[#FFD500] border-b-4 border-black flex items-center justify-between px-4 md:px-8 h-20 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-black text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div class="flex flex-col leading-none mt-1">
<h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-black">QUANTUM</h1>
<span class="text-sm tracking-widest bg-black text-white px-1 w-max">UNLOCK YOUR POTENTIAL</span>
</div>
</div>
<button class="border-4 border-black bg-white p-1 brutalist-shadow brutalist-button active:translate-y-2 active:translate-x-2">
<span class="material-symbols-outlined text-3xl block">settings</span>
</button>
</header>
<!-- Main Content Grid -->
<main class="flex-grow w-full max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-0 border-4 border-black bg-white mt-28 mb-24 md:mb-12 relative z-10 shadow-[16px_16px_0px_0px_rgba(0,0,0,1)]">
<!-- Column 1: Status -->
<div class="col-span-1 border-b-4 md:border-b-0 md:border-r-4 border-black p-6 bg-[#0000FF] text-white flex flex-row md:flex-col justify-between md:justify-start gap-4">
<div class="border-4 border-black bg-[#FFD500] text-black px-4 py-2 brutalist-shadow w-max transform -rotate-2">
<span class="text-2xl block">🔥 7 DAY STREAK</span>
</div>
<div class="border-4 border-black bg-white text-black px-4 py-2 brutalist-shadow w-max transform rotate-1">
<span class="material-symbols-outlined align-middle mr-1">tag</span>
<span class="text-xl align-middle" id="quote-counter">QUOTE 1 OF 50</span>
</div>
</div>
<!-- Column 2 & 3: Content -->
<div class="col-span-1 md:col-span-2 flex flex-col relative overflow-hidden bg-white">
<div class="overlap-text">READ<br>THIS</div>
<!-- Quote Area -->
<div class="flex-grow p-8 md:p-16 border-b-4 border-black relative z-20">
<span class="material-symbols-outlined text-8xl text-black/10 absolute top-4 left-4 pointer-events-none" style="font-variation-settings: 'FILL' 1;">format_quote</span>
<div class="relative z-10 flex flex-col gap-8 mt-12" id="quote-container">
<p class="text-4xl md:text-6xl text-black leading-none tracking-tight" id="quote-text">
                    "The universe is change; our life is what our thoughts make it."
                </p>
<div class="inline-block bg-black text-white px-4 py-2 w-max brutalist-shadow">
<p class="text-2xl md:text-3xl tracking-wide m-0" id="quote-author">
                        MARCUS AURELIUS
                    </p>
</div>
</div>
</div>
<!-- Actions Area -->
<div class="p-8 md:p-12 bg-[#FFD500] flex flex-col md:flex-row items-center gap-8 justify-between relative z-20">
<button class="bg-[#FF0000] text-white border-4 border-black w-full md:w-auto px-8 py-4 text-3xl brutalist-shadow brutalist-button flex items-center justify-center gap-3" id="generate-btn">
<span class="material-symbols-outlined text-4xl">bolt</span>
                GENERATE
            </button>
<div class="flex gap-4">
<button aria-label="Copy Quote" class="bg-white text-black border-4 border-black w-16 h-16 flex items-center justify-center brutalist-shadow brutalist-button" id="copy-btn">
<span class="material-symbols-outlined text-3xl block">content_copy</span>
</button>
<button aria-label="Share on X" class="bg-white text-black border-4 border-black w-16 h-16 flex items-center justify-center brutalist-shadow brutalist-button">
<svg class="w-8 h-8 fill-current block" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 5.961h-1.91z"></path></svg>
</button>
<button aria-label="Share on WhatsApp" class="bg-[#0000FF] text-white border-4 border-black w-16 h-16 flex items-center justify-center brutalist-shadow brutalist-button">
<svg class="w-8 h-8 fill-current block" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"></path></svg>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar for Mobile (Visible md:hidden) -->
<nav class="fixed bottom-0 w-full bg-white border-t-4 border-black z-50 flex md:hidden justify-around items-center p-2 pb-safe">
<a class="flex flex-col items-center justify-center bg-[#FF0000] text-white border-4 border-black w-14 h-14 brutalist-shadow brutalist-button" href="#">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</a>
<a class="flex flex-col items-center justify-center text-black border-4 border-transparent hover:border-black w-14 h-14 transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">format_quote</span>
</a>
<a class="flex flex-col items-center justify-center text-black border-4 border-transparent hover:border-black w-14 h-14 transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">star</span>
</a>
<a class="flex flex-col items-center justify-center text-black border-4 border-transparent hover:border-black w-14 h-14 transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">person</span>
</a>
</nav>
<!-- Toast Notification -->
<div class="toast bg-[#0000FF] border-4 border-black text-white px-6 py-4 flex items-center gap-3 z-50" id="toast">
<span class="material-symbols-outlined text-2xl">check_circle</span>
<span class="text-xl tracking-wider">COPIED TO CLIPBOARD!</span>
</div>
<!-- Application Logic -->
<script>
    const quotes = [
        { text: "The universe is change; our life is what our thoughts make it.", author: "Marcus Aurelius" },
        { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" },
        { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
        { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
        { text: "You have power over your mind - not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
        { text: "Continuous effort - not strength or intelligence - is the key to unlocking our potential.", author: "Winston Churchill" },
        { text: "The obstacle in the path becomes the path. Never forget, within every obstacle is an opportunity to improve our condition.", author: "Ryan Holiday" },
        { text: "We suffer more often in imagination than in reality.", author: "Seneca" },
        { text: "If you want to live a happy life, tie it to a goal, not to people or things.", author: "Albert Einstein" },
        { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" }
    ];

    let seenIndices = new Set();
    let currentQuoteIndex = 0;

    const quoteContainer = document.getElementById('quote-container');
    const quoteText = document.getElementById('quote-text');
    const quoteAuthor = document.getElementById('quote-author');
    const generateBtn = document.getElementById('generate-btn');
    const counterText = document.getElementById('quote-counter');
    const copyBtn = document.getElementById('copy-btn');
    const toast = document.getElementById('toast');

    function getRandomIndex() {
        if (seenIndices.size >= quotes.length) {
            seenIndices.clear();
        }
        let idx;
        do {
            idx = Math.floor(Math.random() * quotes.length);
        } while (seenIndices.has(idx));
        seenIndices.add(idx);
        return idx;
    }

    function generateQuote() {
        quoteContainer.classList.remove('quote-transition-enter-active');
        quoteContainer.classList.add('quote-transition-enter');

        setTimeout(() => {
            const idx = getRandomIndex();
            const quote = quotes[idx];
            
            quoteText.textContent = `"${quote.text}"`;
            quoteAuthor.textContent = quote.author.toUpperCase();
            
            currentQuoteIndex = Math.min(50, seenIndices.size);
            counterText.textContent = `QUOTE ${currentQuoteIndex} OF 50`;

            requestAnimationFrame(() => {
                quoteContainer.classList.remove('quote-transition-enter');
                quoteContainer.classList.add('quote-transition-enter-active');
            });
        }, 200);
    }

    generateBtn.addEventListener('click', generateQuote);

    copyBtn.addEventListener('click', async () => {
        const textToCopy = `${quoteText.textContent} - ${quoteAuthor.textContent}`;
        try {
            await navigator.clipboard.writeText(textToCopy);
            showToast();
        } catch (err) {
            console.error('Failed to copy text: ', err);
        }
    });

    function showToast() {
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    seenIndices.add(0);
    quoteContainer.classList.add('quote-transition-enter-active');
</script>
</body></html>
