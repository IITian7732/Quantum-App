<style>
        body {
            background-color: #020617; /* Slate 950 */
            color: #dae2fd; /* on-surface */
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Glassmorphism utility classes */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-input {
            background: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            border-color: rgba(6, 182, 212, 0.5); /* Cyan glow */
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
            outline: none;
            background: rgba(30, 41, 59, 0.4);
        }

        .glow-border-card {
            position: relative;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 2rem; /* tailwind lg */
            z-index: 1;
        }

        .glow-border-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 2.1rem;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.4), rgba(6, 182, 212, 0.4));
            z-index: -1;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 1px;
        }
        
        .light-hit {
            position: absolute;
            top: 0;
            left: 0;
            width: 150px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border-radius: 2rem 0 0 0;
            z-index: 2;
        }

        .btn-primary-gradient {
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .btn-primary-gradient:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3), 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .btn-social {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        
        .btn-social:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        /* Custom Checkbox */
        .cyber-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            display: inline-block;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            vertical-align: middle;
        }

        .cyber-checkbox:checked {
            background: rgba(139, 92, 246, 0.8);
            border-color: #06b6d4;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
        }

        .cyber-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Subtle mesh glow animation */
        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(10px, -15px) scale(1.05); opacity: 0.7; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
        }
        
        .ambient-glow-1 {
            position: absolute;
            top: 10%;
            right: 20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            animation: floatGlow 15s ease-in-out infinite;
            z-index: -2;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: 20%;
            left: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: floatGlow 20s ease-in-out infinite reverse;
            z-index: -2;
            pointer-events: none;
        }
        
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>

</div>

</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>

</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase block" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="glass-input w-full h-12 rounded-lg pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-body-md text-body-md focus:ring-0" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-center space-x-3 mt-4">
<input class="cyber-checkbox flex-shrink-0" id="terms" type="checkbox"/>
<label class="font-body-md text-[14px] text-on-surface-variant select-none" for="terms">
                        I agree to the <a class="text-brand-cyan hover:text-secondary-fixed transition-colors underline decoration-brand-cyan/30 underline-offset-2" href="#">Terms of Service</a> and <a class="text-brand-cyan hover:text-secondary-fixed transition-colors underline decoration-brand-cyan/30 underline-offset-2" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<button class="btn-primary-gradient w-full h-14 rounded-full font-headline-md text-[16px] text-white flex items-center justify-center space-x-2 mt-8" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<span class="px-4 font-label-sm text-label-sm text-outline-variant uppercase">Or continue with</span>
<div class="flex-grow h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
</div>
<!-- Social Logins -->

<span class="font-body-md text-[14px] text-on-surface">Google</span>
